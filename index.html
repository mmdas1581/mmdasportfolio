</head>
<body>
    <!-- Studio Background Image with Reduced Opacity -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('assets/images/studio_background.jpg') center/cover no-repeat; opacity: 0.2; z-index: -2; pointer-events: none;"></div>
    
    <header>
        <div class="logo">Manu M Das</div> <!-- Adding the script aesthetic from reference -->
        <nav>
            <a href="index.html" class="nav-link active">Home</a>
            <a href="bio.html" class="nav-link">About</a>
            <a href="statement.html" class="nav-link">Statement</a>
                        <div class="dropdown">
                <a href="#" class="nav-link" style="cursor:default;">Portfolio</a>
                <div class="dropdown-content">
                    <a href="works-2026.html">Works 2026</a>
                    <a href="works-2025.html">Works 2025</a>
                    <a href="works-2024.html">Works 2024</a>
                    <a href="video-works.html">Video Documentation</a>
                </div>
            </div>
            <a href="cv.html" class="nav-link">CV</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </nav>
    </header>

    <div class="container">
        <!-- Exactly simulating the mahimjana home style -->
        <div style="text-align: center; margin-top: 10vh;">
            <h2 style="font-size: 3rem; color: #111; margin-bottom: 2rem; font-weight: 500; font-family: 'Cormorant Garamond', serif;">Manu M Das</h2>
            <p style="font-size: 1.2rem; color: #555; font-family: 'Inter', sans-serif; letter-spacing: 2px; text-transform: uppercase;">
                Multidisciplinary Visual artist
            </p>
        </div>

        <!-- Sliding Image Strip (5s interval loop) -->
        <div class="carousel-wrapper" style="width: 100%; max-width: 1000px; margin: 60px auto 0; overflow: hidden; position: relative; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.03);">
            <div class="carousel-track" style="display: flex; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);">
                <img src="assets/images/page_10_img_1.jpeg" alt="Portfolio Image 1" style="flex: 0 0 100%; width: 100%; object-fit: cover; aspect-ratio: 21/9;">
                <img src="assets/images/page_12_img_1.jpeg" alt="Portfolio Image 2" style="flex: 0 0 100%; width: 100%; object-fit: cover; aspect-ratio: 21/9;">
                <img src="assets/images/page_14_img_1.jpeg" alt="Portfolio Image 3" style="flex: 0 0 100%; width: 100%; object-fit: cover; aspect-ratio: 21/9;">
                <img src="assets/images/page_7_img_1.jpeg" alt="Portfolio Image 4" style="flex: 0 0 100%; width: 100%; object-fit: cover; aspect-ratio: 21/9;">
                <img src="assets/images/page_20_img_1.jpeg" alt="Portfolio Image 5" style="flex: 0 0 100%; width: 100%; object-fit: cover; aspect-ratio: 21/9;">
                <img src="assets/images/page_25_img_1.jpeg" alt="Portfolio Image 6" style="flex: 0 0 100%; width: 100%; object-fit: cover; aspect-ratio: 21/9;">
            </div>
        </div>
    </div>

    <script>
        const track = document.querySelector('.carousel-track');
        const images = document.querySelectorAll('.carousel-track img');
        let currentIndex = 0;
        const totalImages = images.length;

        // Automatically slide every 5 seconds
        setInterval(() => {
            currentIndex = (currentIndex + 1) % totalImages;
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
        }, 5000);
    </script>
</body>
</html>
